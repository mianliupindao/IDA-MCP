[pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    core: api_core 模块测试
    analysis: api_analysis 模块测试
    types: api_types 模块测试
    modify: api_modify 模块测试
    modeling: api_modeling 模块测试
    memory: api_memory 模块测试
    stack: api_stack 模块测试
    debug: api_debug 模块测试 (需要调试器)
    resources: api_resources 模块测试
    lifecycle: Lifecycle management tests (open/close IDA)
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
